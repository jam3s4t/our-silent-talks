<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Interactive Story Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Sarabun:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bgm" src="bgm.mp3" loop></audio>

    <div id="petal-container"></div>

    <div class="story-container">
        <h2 id="story-title">บทสนทนาไร้เสียง</h2>
        <img id="story-image" src="" alt="Story Image">
        <p id="story-text"></p>
        
        <div id="choices">
            <button class="btn-camellia" onclick="chooseCamellia()">มอบดอกคามิลเลีย</button>
            <button class="btn-higanbana" onclick="chooseHiganbana()">มอบดอกฮิกังบานะ</button>
        </div>

        <button id="btn-back" class="btn-restart" onclick="goBack()">ย้อนกลับ</button>

        <div class="message-section">
            <h3>ทิ้งความรู้สึกของคุณไว้ที่นี่...</h3>
            <input type="text" id="user-input" placeholder="พิมพ์ความรู้สึกของคุณ...">
            <button class="btn-submit" onclick="sendSecretMessage()">ส่งข้อความ</button>
            <div id="status-message"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
